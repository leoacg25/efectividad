name: Backup Diario

permissions:
  contents: write

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar firebase-admin
        run: npm install firebase-admin

      - name: Ejecutar backup
        run: node scripts/backup.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          BACKUP_DIR: backups

      - name: Commit y push del backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "backup diario $(date +'%Y-%m-%d')"
          git push
